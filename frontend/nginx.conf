server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ── Gzip Compression (Core Web Vitals: LCP/FID improvement) ────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Security Headers (Trust signals + Google ranking factor) ───────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.coldscout.colddsam.com https://*.supabase.co https://lumberjack.razorpay.com https://api.razorpay.com; frame-src https://api.razorpay.com https://checkout.razorpay.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Cache Static Assets (Performance) ──────────────────────────────────
    # Hashed assets (Vite fingerprints these) — cache 1 year
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Images, fonts, icons
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SEO & crawler files — short cache (updated frequently)
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain";
        access_log off;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/xml";
        access_log off;
    }

    location = /sitemap-images.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/xml";
        access_log off;
    }

    location = /llms.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain";
        access_log off;
    }

    location = /site.webmanifest {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/manifest+json";
        access_log off;
    }

    # ── SPA Routing — serve index.html for all routes ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # HTML — no cache (always fresh for SEO metadata updates)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── API Proxy ───────────────────────────────────────────────────────────
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }

    # ── Custom Error Pages ──────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ── Logging ─────────────────────────────────────────────────────────────
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
