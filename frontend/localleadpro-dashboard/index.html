<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Cold Scout — AI Lead Generation Platform</title>
    <meta name="title" content="Cold Scout — AI Lead Generation Platform" />
    <meta
      name="description"
      content="Cold Scout is an AI-powered lead generation platform that discovers, qualifies, and engages local business leads at scale. Automate your entire outreach pipeline from search to inbox."
    />
    <meta name="keywords" content="AI lead generation, local business leads, cold outreach automation, lead qualification, email campaign automation, Google Maps scraping, sales pipeline, CRM, B2B leads" />
    <meta name="author" content="Cold Scout" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://coldscout.colddsam.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://coldscout.colddsam.com/" />
    <meta property="og:site_name" content="Cold Scout" />
    <meta property="og:title" content="Cold Scout — AI Lead Generation Platform" />
    <meta
      property="og:description"
      content="Cold Scout uses AI to discover, enrich, and engage local business leads — automating your entire outreach pipeline from search to inbox."
    />
    <meta property="og:image" content="https://coldscout.colddsam.com/banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://coldscout.colddsam.com/" />
    <meta name="twitter:title" content="Cold Scout — AI Lead Generation Platform" />
    <meta
      name="twitter:description"
      content="Discover, qualify, and engage leads with AI. Automate your outreach pipeline from search to inbox."
    />
    <meta name="twitter:image" content="https://coldscout.colddsam.com/banner.png" />

    <!-- Favicons & PWA -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.coldscout.colddsam.com" />

    <!-- Google Fonts — Inter (UI) + JetBrains Mono (code) with display=swap for CLS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-sans text-black antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
