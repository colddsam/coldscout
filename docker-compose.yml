version: '3.8'

services:
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - APP_ENV=development
    restart: unless-stopped
    volumes:
      - ./backend/config:/app/config
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80" # Exposed on port 8080 to avoid conflicts with common port 80 reservations
    environment:
      - VITE_PROXY_URL=http://api:8000
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
