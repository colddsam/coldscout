name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install testing tools
        pip install pytest pytest-asyncio aiosqlite flake8 httpx
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run Backend Tests
      env:
        APP_ENV: testing
        DATABASE_URL: sqlite+aiosqlite:///./test.db
        SUPABASE_URL: https://dummy.supabase.co
        SUPABASE_ANON_KEY: dummy_anon_key
        REDIS_URL: redis://localhost:6379/0
        GOOGLE_PLACES_API_KEY: dummy_google_key
        GROQ_API_KEY: dummy_groq_key
        BREVO_SMTP_USER: dummy_user
        BREVO_SMTP_PASSWORD: dummy_password
        FROM_EMAIL: test@example.com
        REPLY_TO_EMAIL: test@example.com
        IMAP_USER: dummy_imap_user
        IMAP_PASSWORD: dummy_imap_password
        ADMIN_EMAIL: admin@example.com
        APP_SECRET_KEY: dummy_secret_key
        API_KEY: dummy_api_key
        SECURITY_SALT: dummy_security_salt
        FROM_NAME: "Lead Gen Test"
        IMAP_HOST: "imap.gmail.com"
      run: |
        pytest -v

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm install
      
    - name: Lint frontend
      run: npm run lint
      
    - name: Build frontend
      run: npm run build
